{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:90%;
            max-width:500px;
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        img{
            width:250px;
            height:250px;
            object-fit:cover;
            border-radius:10px;
        }

        input, select, textarea{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            background:#0d47a1;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ✅ IMAGE FROM DATABASE -->
    <img src="{{ product.image.url }}" alt="{{ product.name }}">

    <h1>{{ product.name }}</h1>

    <p>₹{{ product.price }}</p>

    <form action="/save-order/" method="post">
        {% csrf_token %}

        <select name="size" required>
            <option value="">Select Size</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
        </select>

        <input type="text" name="name" placeholder="Full Name" required>
        <textarea name="address" placeholder="Address" required></textarea>
        <input type="text" name="pincode" placeholder="PIN Code" required>
        <input type="text" name="phone" placeholder="Phone Number" required>

        <button type="submit">Proceed to Payment</button>
    </form>

</div>

</body>
</html>
