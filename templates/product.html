{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Order Product</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        .box{
            width:500px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px #ccc;
        }

        img{
            width:250px;
            border-radius:10px;
        }

        h2{
            margin-top:15px;
        }

        select,
        input,
        textarea{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#e65c00;
        }
    </style>
</head>
<body>

<div class="box">

    <form method="POST" action="/save-order/">
        {% csrf_token %}

        <img src="{% static 'images/slippers.jpg' %}" alt="Comfort Slippers">

        <h2>Comfort Slippers</h2>

        <p><b>Price: ₹299</b></p>

        <h3>Select Size</h3>

        <select name="size" required>
            <option value="">Select Size</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>

        <input type="text" name="full_name" placeholder="Full Name" required>

        <textarea name="address" placeholder="Delivery Address" required></textarea>

        <input type="text" name="phone" placeholder="Mobile Number" required>

        <br><br>

        <button type="submit">Continue To Payment</button>

    </form>

</div>

</body>
</html>
