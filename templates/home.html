{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendsShop</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        /* Splash Screen */
        #splash{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100vh;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        #splash img{
            width:250px;
            max-width:80%;
        }

        #main-content{
            display:none;
        }

        .header{
            background:#0d47a1;
            color:white;
            text-align:center;
            padding:20px;
        }

        .header img{
            width:180px;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:nowrap;
            overflow-x:auto;
            padding:40px;
        }

        .product{
            background:white;
            width:200px;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px #ccc;
        }

        .product img{
            width:180px;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            font-size:22px;
            font-weight:bold;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#e65c00;
        }
    </style>
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="{% static 'images/logo.png' %}" alt="FriendsShop Logo">
    </div>

    <!-- Main Website -->
    <div id="main-content">

        <div class="header">
            <img src="{% static 'images/logo.png' %}" alt="FriendsShop Logo">
            <h2>Your Trusted Footwear Store</h2>
        </div>

        <div class="products">

            <div class="product">
                <img src="{% static 'images/slippers.jpg' %}" alt="Comfort Slippers">
                <h2>Comfort Slippers</h2>
                <p class="price">₹299</p>

                <a href="/product/?product=slippers">
                    <button>Buy Now</button>
                </a>
            </div>

            <div class="product">
                <img src="{% static 'images/sandals.jpg' %}" alt="Sports Sandals">
                <h2>Sports Sandals</h2>
                <p class="price">₹499</p>

                <a href="/product/?product=sandals">
                    <button>Buy Now</button>
                </a>
            </div>

            <div class="product">
                <img src="{% static 'images/footwear.jpg' %}" alt="Daily Wear Footwear">
                <h2>Daily Wear Footwear</h2>
                <p class="price">₹399</p>

                <a href="/product/?product=footwear">
                    <button>Buy Now</button>
                </a>
            </div>

        </div>

    </div>

    <script>
        setTimeout(function() {
            document.getElementById("splash").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }, 4000);
    </script>

</body>
</html>
