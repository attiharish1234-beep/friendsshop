{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>FriendsShop</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        .header{
            background:#0d47a1;
            color:white;
            text-align:center;
            padding:20px;
        }

        .header img{
            width:180px;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
            padding:40px;
        }

        .product{
            background:white;
            width:250px;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px #ccc;
        }

        .product img{
            width:200px;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .product h2{
            font-size:28px;
        }

        .price{
            font-size:22px;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#e65c00;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="{% static 'images/logo.png' %}" alt="Logo">
    <h2>Your Trusted Footwear Store</h2>
</div>

<div class="products">

    <div class="product">
        <img src="{% static 'images/slippers.jpg' %}" alt="Slippers">
        <h2>Comfort Slippers</h2>
        <p class="price">₹299</p>

        <a href="/product/">
            <button>Buy Now</button>
        </a>
    </div>

    <div class="product">
        <img src="{% static 'images/sandals.jpg' %}" alt="Sandals">
        <h2>Sports Sandals</h2>
        <p class="price">₹499</p>

        <a href="/product/">
            <button>Buy Now</button>
        </a>
    </div>

    <div class="product">
        <img src="{% static 'images/footwear.jpg' %}" alt="Footwear">
        <h2>Daily Wear Footwear</h2>
        <p class="price">₹399</p>

    <div class="product">
        <img src="{% static 'images/buckle.jpg' %}" alt="buckle">
        <h2>buckles</h2>
        <p class="price">₹449</p>

        <a href="/product/">
            <button>Buy Now</button>
        </a>
    </div>

</div>

</body>
</html>
