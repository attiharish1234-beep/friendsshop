{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendsShop</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        /* Splash Screen */
        #splash{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100vh;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        #splash img{
            width:250px;
            max-width:80%;
        }

        #main-content{
            display:none;
        }

        .header{
            background:#0d47a1;
            color:white;
            text-align:center;
            padding:20px;
        }

        .header img{
            width:180px;
        }

        /* PRODUCTS SCROLL */
        .products{
            display:flex;
            gap:20px;
            overflow-x:auto;
            padding:40px;
            scroll-snap-type:x mandatory;
        }

        .product{
            background:white;
            min-width:200px;
            flex-shrink:0;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px #ccc;
            scroll-snap-align:start;
        }

        .product img{
            width:180px;
            height:200px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            font-size:22px;
            font-weight:bold;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#e65c00;
        }
    </style>
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash">
        <img src="{% static 'images/logo.png' %}" alt="FriendsShop Logo">
    </div>

    <!-- Main Website -->
    <div id="main-content">

        <div class="header">
            <img src="{% static 'images/logo.png' %}" alt="FriendsShop Logo">
            <h2>Your Trusted Footwear Store</h2>
        </div>

        <!-- PRODUCTS FROM ADMIN -->
        <div class="products">

            {% for product in products %}
            <div class="product">

                <!-- IMAGE FROM ADMIN -->
                <img src="{{ product.image.url }}" alt="{{ product.name }}">

                <h2>{{ product.name }}</h2>
                <p class="price">₹{{ product.price }}</p>

                <a href="/product/{{ product.id }}/">
                    <button>Buy Now</button>
                </a>

            </div>
            {% endfor %}

        </div>

    </div>

    <script>
        setTimeout(function() {
            document.getElementById("splash").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }, 4000);
    </script>

</body>
</html>
