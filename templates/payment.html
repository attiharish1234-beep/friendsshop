{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .box{
            width:500px;
            margin:100px auto;
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        img{
            width:250px;
            margin-top:15px;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Scan QR Code to Pay</h2>

    <img src="{% static 'images/upi_qr.jpg' %}" alt="QR Code">

    <p>Please complete the payment and then click the button below.</p>

    <a href="/success/">
        <button>Payment Done</button>
    </a>

</div>

</body>
</html>
