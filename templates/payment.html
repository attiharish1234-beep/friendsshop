<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .box{
            width:500px;
            margin:100px auto;
            background:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Select Payment Method</h2>

    <input type="radio" name="payment" checked>
    Cash On Delivery

    <br><br>

    <a href="/success/">
        <button>Book Now</button>
    </a>

</div>

</body>
</html>
